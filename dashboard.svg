<svg fill="none" viewBox="0 0 800 600" width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
        
        .container {
          font-family: 'Courier New', monospace;
          background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
          color: #00ff00;
          width: 100%;
          height: 600px;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding-top: 40px;
          box-sizing: border-box;
        }
        
        h1 {
          font-family: 'Press Start 2P', cursive;
          font-size: 35px;
          text-shadow: 3px 3px 0px #ff00ff, 6px 6px 0px #00ffff;
          margin-bottom: 10px;
          color: #ffffff;
          animation: float 3s ease-in-out infinite;
        }

        .subtitle {
          color: #00ffff;
          font-size: 18px;
          margin-bottom: 40px;
          text-shadow: 2px 2px 0px #ff00ff;
        }

        .grid {
          display: flex;
          gap: 15px;
          flex-wrap: wrap;
          justify-content: center;
          max-width: 700px;
        }

        .box {
          background: rgba(0, 255, 255, 0.1);
          border: 2px solid #00ffff;
          padding: 15px;
          width: 90px;
          text-align: center;
          box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
          border-radius: 8px;
        }

        .text-box {
          margin-top: 30px;
          background: rgba(255, 0, 255, 0.1);
          border: 2px solid #ff00ff;
          padding: 20px;
          max-width: 600px;
          line-height: 1.6;
          box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
          border-radius: 8px;
          color: #fff;
        }

        @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
        }
      </style>

      <div class="container">
        <h1>ABIRAL SABA</h1>
        <div class="subtitle">// Code Architect & Problem Solver //</div>

        <div class="grid">
          <div class="box">C++</div>
          <div class="box">Java</div>
          <div class="box">JS</div>
          <div class="box">React</div>
          <div class="box">HTML</div>
          <div class="box">CSS</div>
          <div class="box">MySQL</div>
          <div class="box">Node</div>
          <div class="box">Mongo</div>
          <div class="box">Python</div>
          <div class="box">Figma</div>
        </div>

        <div class="text-box">
          ▸ Passionate about Algorithmic Challenges<br/>
          ▸ Full-Stack Development<br/>
          ▸ Building Scalable Solutions
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
